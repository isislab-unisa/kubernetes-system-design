<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kubernetes System Design</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;700&display=swap");

      @page {
        size: A4;
        margin: 0;
      }

      html,
      body {
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Space Grotesk", "Segoe UI", sans-serif;
        background: #ffffff;
        display: flex;
        justify-content: center;
        align-items: flex-start;
      }

      /* A4 page: 210mm x 297mm */
      .cover-container {
        position: relative;
        width: 210mm;
        height: 297mm;
        background: linear-gradient(
          to bottom,
          #ffffff 28%,
          rgb(50 108 229) 28%
        );
        overflow: hidden;

        display: flex;
        flex-direction: column;
        align-items: flex-start;
        text-align: left;
        box-sizing: border-box;
        padding: 28mm 16mm 18mm;
      }

      h1 {
        margin: 0;
        font-family: "Bebas Neue", "Impact", sans-serif;
        letter-spacing: 0.8mm;
        font-size: 26mm;
        line-height: 1.1;
        z-index: 2;
      }

      .subtitle {
        margin-top: 8mm;
        font-size: 5.5mm;
        font-weight: 500;
        line-height: 1.35;
        max-width: 155mm;
        z-index: 2;
      }

      .logo-bg {
        position: absolute;
        left: 50%;
        right: auto;
        bottom: 36%;
        transform: translateX(-50%) translateY(50%);
        width: 100%;
        height: 100%;
        background: url("kube.png") center center / 45% no-repeat;
        opacity: 1;
        pointer-events: none;
      }

      .authors {
        position: absolute;
        font-family: "Bebas Neue", "Impact", sans-serif;
        left: 12mm;
        bottom: 12mm;
        z-index: 2;
        font-size: 10mm;
        line-height: 1.4;
        text-align: left;
        font-weight: bold;
        /* color: #e9e9e9; */
      }

      .authors p {
        margin: 0.8mm 0;
      }

      @media screen {
        .cover-container {
          /* box-shadow: 0 6px 24px rgba(0, 0, 0, 0.2); */
          margin: 12px 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="cover-container">
      <h1>Kubernetes System Design</h1>
      <h1 style="color: #ffffff">in small easy steps</h1>

      <div class="logo-bg"></div>

      <div class="authors">
        <p>Tiziano Citro</p>
        <p>Daniele De Vinco</p>
        <p>Vittorio Scarano</p>
      </div>
    </div>
  </body>
</html>
