name: Release on Zenodo

on:
  workflow_dispatch:

jobs:
  create-release-and-upload:
    runs-on: ubuntu-latest
    name: Build PDF, create GitHub release, and upload to Zenodo

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24


      - name: Install Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser || sudo apt-get install -y chromium


      - name: Convert print page to PDF
        run: |
          chromium-browser \
            --headless \
            --disable-gpu \
            --no-sandbox \
            --run-all-compositor-stages-before-draw \
            --virtual-time-budget=10000 \
            --print-to-pdf=kubernetes-system-design/book/kubernetes-system-design.pdf \
            "https://isislab-unisa.github.io/kubernetessystemdesign/print.html"

      - name: Get current date for release tag
        id: date
        run: echo "date=$(date +'%Y.%m.%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release and upload PDF
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.date.outputs.date }}
          name: Release ${{ steps.date.outputs.date }}
          files: kubernetes-system-design/book/kubernetes-system-design.pdf
          draft: false
          prerelease: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install requests

      - name: Upload PDF to Zenodo
        env:
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
        run: python utils/upload_to_zenodo_action.py --pdf kubernetes-system-design/book/kubernetes-system-design.pdf --deposition-id 18786215
